<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SHIELD X - Attack Replay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c12; color: #eef2ff; }
        
        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f111a 0%, #07090f 100%);
            border-right: 1px solid rgba(79, 70, 229, 0.2);
            padding: 28px 20px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .shield-icon { font-size: 32px; color: #4f46e5; }
        .logo-text h1 { font-size: 20px; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-item.active, .nav-item:hover { background: rgba(79, 70, 229, 0.15); color: #a78bfa; }
        
        .main-content { flex: 1; padding: 28px 36px; background: #0b0d14; }
        
        .replay-controls {
            background: #0f111b;
            border: 1px solid #22242f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .attack-timeline {
            background: #0f111b;
            border: 1px solid #22242f;
            border-radius: 20px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .timeline-item {
            padding: 15px;
            border-left: 3px solid #4f46e5;
            margin-bottom: 15px;
            background: #1a1c26;
            border-radius: 8px;
        }
        
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        @media (max-width: 1000px) {
            .sidebar { width: 80px; }
            .logo-text, .nav-item span { display: none; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo-area">
            <i class="fas fa-shield-halos shield-icon"></i>
            <div class="logo-text"><h1>AI SHIELD X</h1><p>AI DEFENSE SYSTEM</p></div>
        </div>
        <div class="nav-menu">
            <a href="/" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="/threat-monitor" class="nav-item"><i class="fas fa-eye"></i><span>Threat Monitor</span></a>
            <a href="/attack-arena" class="nav-item"><i class="fas fa-gamepad"></i><span>Attack Arena</span></a>
            <a href="/prompt-sandbox" class="nav-item"><i class="fas fa-terminal"></i><span>Prompt Sandbox</span></a>
            <a href="/analytics" class="nav-item"><i class="fas fa-chart-line"></i><span>Analytics</span></a>
            <a href="/attack-replay" class="nav-item active"><i class="fas fa-history"></i><span>Attack Replay</span></a>
            <a href="/api-gateway" class="nav-item"><i class="fas fa-plug"></i><span>API Gateway</span></a>
            <a href="/honeypot" class="nav-item"><i class="fas fa-jar"></i><span>Honeypot</span></a>
        </div>
    </aside>
    
    <main class="main-content">
        <h2>Attack Replay</h2>
        <p>Review and analyze past attack patterns</p>
        
        <div class="replay-controls">
            <button onclick="loadHistory()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button onclick="exportLogs()"><i class="fas fa-download"></i> Export Logs</button>
            <select id="filter" onchange="filterAttacks()" style="background:#1a1c26; padding:10px; border-radius:8px;">
                <option value="all">All Attacks</option>
                <option value="Critical">Critical Only</option>
                <option value="High">High Severity</option>
                <option value="Medium">Medium Severity</option>
            </select>
        </div>
        
        <div class="attack-timeline" id="timeline">
            <p>Loading attack history...</p>
        </div>
    </main>
</div>

<script>
    let attacks = [];
    
    async function loadHistory() {
        const response = await fetch('/api/attack-history');
        const data = await response.json();
        attacks = data.history || [];
        displayAttacks();
    }
    
    function displayAttacks() {
        const filter = document.getElementById('filter').value;
        let filtered = attacks;
        if (filter !== 'all') {
            filtered = attacks.filter(a => a.severity === filter);
        }
        
        const timeline = document.getElementById('timeline');
        if (filtered.length === 0) {
            timeline.innerHTML = '<p>No attacks found</p>';
            return;
        }
        
        timeline.innerHTML = filtered.map(attack => `
            <div class="timeline-item">
                <div style="display: flex; justify-content: space-between;">
                    <strong>${attack.type}</strong>
                    <span style="color: ${attack.severity === 'Critical' ? '#ef4444' : (attack.severity === 'High' ? '#f97316' : '#22c55e')}">${attack.severity}</span>
                </div>
                <p style="font-size: 12px; color: #8b8ca3; margin-top: 8px;">Time: ${new Date(attack.timestamp).toLocaleString()}</p>
                <p style="margin-top: 8px;">Status: <span style="color: #22c55e;">Blocked ✓</span></p>
            </div>
        `).join('');
    }
    
    function filterAttacks() {
        displayAttacks();
    }
    
    function exportLogs() {
        const dataStr = JSON.stringify(attacks, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attack_logs_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    loadHistory();
    setInterval(loadHistory, 10000);
</script>
</body>
</html>
